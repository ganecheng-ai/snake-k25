name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: linux
            ext: tar.gz
            arch: x64
          - os: windows-latest
            target: windows
            ext: exe
            arch: x64
          - os: macos-latest
            target: macos
            ext: dmg
            arch: x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies (Ubuntu)
      if: matrix.target == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev python3-pip python3-venv

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable (Linux)
      if: matrix.target == 'linux'
      run: |
        pyinstaller --onefile --windowed \
          --name "snake-game" \
          --add-data "snake_game:snake_game" \
          --hidden-import pygame \
          --hidden-import snake_game \
          main.py
        mkdir -p dist/snake-game-linux-x64
        cp dist/snake-game dist/snake-game-linux-x64/
        cp -r snake_game dist/snake-game-linux-x64/ 2>/dev/null || true
        tar -czf dist/snake-game-linux-x64.tar.gz -C dist snake-game-linux-x64

    - name: Build executable (Windows)
      if: matrix.target == 'windows'
      shell: pwsh
      run: |
        pyinstaller --onefile --windowed `
          --name "snake-game" `
          --add-data "snake_game;snake_game" `
          --hidden-import pygame `
          --hidden-import snake_game `
          main.py
        New-Item -ItemType Directory -Force -Path "dist/snake-game-windows-x64"
        Copy-Item "dist/snake-game.exe" "dist/snake-game-windows-x64/"
        Copy-Item -Recurse "snake_game" "dist/snake-game-windows-x64/" -ErrorAction SilentlyContinue
        Compress-Archive -Path "dist/snake-game-windows-x64" -DestinationPath "dist/snake-game-windows-x64.zip"
        # 保留 exe 文件用于 checksum
        Move-Item "dist/snake-game-windows-x64/snake-game.exe" "dist/snake-game-windows-x64.exe" -Force

    - name: Build executable (macOS)
      if: matrix.target == 'macos'
      run: |
        pyinstaller --onefile --windowed \
          --name "snake-game" \
          --add-data "snake_game:snake_game" \
          --hidden-import pygame \
          --hidden-import snake_game \
          main.py
        mkdir -p dist/snake-game-macos-x64
        cp dist/snake-game dist/snake-game-macos-x64/
        cp -r snake_game dist/snake-game-macos-x64/ 2>/dev/null || true
        # 创建 DMG（需要创建 app bundle）
        brew install create-dmg || true
        mkdir -p "dist/Snake Game.app/Contents/MacOS"
        cp dist/snake-game "dist/Snake Game.app/Contents/MacOS/"
        # 复制 Info.plist
        cp .github/workflows/assets/Info.plist "dist/Snake Game.app/Contents/"
        # 尝试创建 DMG，如果失败则使用 zip
        if command -v create-dmg &> /dev/null; then
          create-dmg \
            --volname "Snake Game Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "dist/snake-game-macos-x64.dmg" \
            "dist/Snake Game.app" || true
        fi
        # 如果 DMG 创建失败，使用 zip
        if [ ! -f "dist/snake-game-macos-x64.dmg" ]; then
          cd dist && zip -r snake-game-macos-x64.zip "Snake Game.app" && cd ..
        fi
        # 保留二进制文件用于 checksum
        cp dist/snake-game "dist/snake-game-macos-x64"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.target }}-${{ matrix.arch }}
        path: |
          dist/*.tar.gz
          dist/*.exe
          dist/*.dmg
          dist/*.zip
        if-no-files-found: ignore

  create-checksums:
    name: Create Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Generate checksums
      run: |
        mkdir -p release
        # 复制所有构建产物
        find artifacts -type f \( -name "*.tar.gz" -o -name "*.exe" -o -name "*.dmg" -o -name "*.zip" \) -exec cp {} release/ \;
        # 生成 checksums.txt
        cd release
        sha256sum * > checksums.txt
        cat checksums.txt

    - name: Upload checksums
      uses: actions/upload-artifact@v4
      with:
        name: checksums
        path: release/checksums.txt

  release:
    name: Create Release
    needs: [build, create-checksums]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release files
      run: |
        mkdir -p release
        find artifacts -type f \( -name "*.tar.gz" -o -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "checksums.txt" \) -exec cp {} release/ \;
        ls -la release/

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Generate release notes
      id: release_notes
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        echo "## 版本 ${VERSION}" > notes.txt
        echo "" >> notes.txt
        echo "### 新增功能" >> notes.txt
        echo "* 精美的贪吃蛇游戏界面" >> notes.txt
        echo "* 支持简体中文显示" >> notes.txt
        echo "* 方向键和 WASD 双键位控制" >> notes.txt
        echo "* 暂停功能（P键）" >> notes.txt
        echo "* 最高分记录保存" >> notes.txt
        echo "* 渐变色蛇身和动画效果" >> notes.txt
        echo "" >> notes.txt
        echo "### 系统支持" >> notes.txt
        echo "* Windows (x64) - .exe 可执行文件" >> notes.txt
        echo "* Linux (x64) - .tar.gz 压缩包" >> notes.txt
        echo "* macOS (x64) - .dmg 安装包" >> notes.txt
        echo "" >> notes.txt
        echo "### 文件校验" >> notes.txt
        echo "请查看 checksums.txt 文件验证下载文件的完整性。" >> notes.txt
        echo "" >> notes.txt
        echo "### 使用说明" >> notes.txt
        echo "1. 下载对应系统的压缩包" >> notes.txt
        echo "2. 解压/安装到本地" >> notes.txt
        echo "3. 运行 snake-game 可执行文件" >> notes.txt
        echo "4. 使用方向键或 WASD 控制蛇的移动" >> notes.txt
        echo "5. 按 P 键暂停游戏，ESC 键退出" >> notes.txt
        {
          echo 'NOTES<<EOF'
          cat notes.txt
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: "贪吃蛇游戏 ${{ steps.get_version.outputs.VERSION }}"
        body: ${{ steps.release_notes.outputs.NOTES }}
        files: release/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
